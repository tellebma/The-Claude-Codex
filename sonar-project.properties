sonar.projectKey=the-claude-codex
sonar.projectName=The Claude Codex
sonar.projectVersion=1.2.0

# Sources
sonar.sources=src
sonar.tests=__tests__,e2e

# Exclusions : artefacts de build, dépendances, assets, scripts internes,
# docs et fichiers Claude — tout ce qui n'est pas du code source maintenu.
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/coverage/**,**/*.d.ts,**/public/**,**/docs/**,**/.claude/**,**/scripts/**
sonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx,e2e/**/*.spec.ts

# Langue / encoding
sonar.sourceEncoding=UTF-8

# Coverage (LCOV généré par vitest — cf. README pour ajouter le reporter lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclure du code coverage ce qui n'a pas de logique :
# - layouts / pages App Router (Next.js génère ces fichiers, leur logique testable
#   est dans les composants qu'ils rendent, eux déjà couverts)
# - not-found / globals.css (pas de logique métier)
# - config i18n (next-intl : fichiers de configuration, pas de logique testable)
sonar.coverage.exclusions=src/app/**/layout.tsx,src/app/**/page.tsx,src/app/**/not-found.tsx,src/app/globals.css,src/**/*.d.ts,__tests__/**,e2e/**,src/i18n/config.ts,src/i18n/navigation.ts,src/i18n/routing.ts,src/i18n/request.ts

# Exclusions de duplication (CPD)
# US-09 — Le projet est bilingue : content/fr/**.mdx et content/en/**.mdx
# partagent par construction la même structure (mêmes composants MDX, mêmes
# balises, mêmes frontmatter). Ces duplications sont LÉGITIMES et attendues,
# les inclure dans le calcul gonfle artificiellement la densité de duplication.
# Les fichiers messages/*.json (traductions UI) ont le même motif.
# L'exclusion ne s'applique PAS au code TypeScript : les vraies duplications de
# composants ou helpers restent détectées et devront être extraites (cf. US-10).
sonar.cpd.exclusions=content/fr/**,content/en/**,messages/**

# Host (laisser commenté — fourni via la CLI du scanner)
# sonar.host.url=http://localhost:9000
# sonar.token=xxxxxxxx
