name: PR Checks

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  # Variables Matomo inlinees au build par Next.js — valeurs factices en CI.
  # Les vraies valeurs sont injectees au build Docker (cf. cd.yml).
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: Dependency audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      # Pourquoi --audit-level=critical :
      # Site 100% SSG (output: 'export'). Les CVE HIGH sur next.js (DoS SSR,
      # Image Optimizer, rewrites, RSC deserialization) ne s'appliquent pas :
      # Next.js ne tourne qu'au build-time, pas au runtime (c'est Nginx qui sert).
      # Les MAJ majeures (next 14→16) sont pilotées par Dependabot.
      # On bloque donc seulement sur CRITICAL — à remonter à HIGH si le projet
      # bascule un jour en SSR/API routes.
      - name: npm audit (production deps only)
        run: npm audit --omit=dev --audit-level=critical

  lint-types:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

  unit-tests:
    name: Unit tests (coverage 80% gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # requis pour Sonar (history de blame)

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        # Le gate 80% est configure dans vitest.config.ts
        # (thresholds statements/branches/functions/lines = 80).
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 7

  build:
    name: Build (SSG export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-types]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: next-out
          path: out/
          retention-days: 3

  validate-seo-files:
    name: Validate SEO/IA files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Validate sitemap / robots / llms.txt
        run: node scripts/validate-static-output.ts

  lighthouse:
    name: Lighthouse CI (SEO / a11y / perf)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true

  lychee:
    name: Broken links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Restore lychee cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Lychee link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config .lychee.toml --cache --root-dir ${{ github.workspace }}/out './out/**/*.html'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  e2e-smoke:
    name: E2E smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Run Playwright smoke tests
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  sonarqube:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-lcov
          path: coverage/

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  pr-metrics-comment:
    # Agrège les métriques des outils d'analyse en un seul commentaire sticky
    # sur la PR (update du même commentaire à chaque push via `header:`).
    # Ne bloque pas la CI : `if: always()` permet de reporter l'état même si
    # un job précédent a failed. Skip sur les PRs Dependabot (pas de secrets).
    name: PR metrics comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint-types
      - unit-tests
      - build
      - sonarqube
      - lychee
      - e2e-smoke
      - lighthouse
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact (best effort)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-lcov
          path: coverage/

      - name: Collect SonarQube metrics
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: the-claude-codex
        run: |
          set -euo pipefail

          qg_json=$(curl -sf -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}" \
            || echo '{}')

          qg_status=$(echo "$qg_json" | jq -r '.projectStatus.status // "UNKNOWN"')

          new_cov=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_coverage") | .actualValue // "?"')
          new_cov_status=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_coverage") | .status // "OK"')

          new_dup=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_duplicated_lines_density") | .actualValue // "?"')
          new_dup_status=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_duplicated_lines_density") | .status // "OK"')

          new_viol=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_violations") | .actualValue // "?"')
          new_viol_status=$(echo "$qg_json" | jq -r '.projectStatus.conditions[]? | select(.metricKey=="new_violations") | .status // "OK"')

          meas_json=$(curl -sf -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/measures/component?component=${SONAR_PROJECT_KEY}&metricKeys=bugs,code_smells,vulnerabilities,security_hotspots,coverage" \
            || echo '{}')

          bugs=$(echo "$meas_json" | jq -r '.component.measures[]? | select(.metric=="bugs") | .value // "?"')
          smells=$(echo "$meas_json" | jq -r '.component.measures[]? | select(.metric=="code_smells") | .value // "?"')
          vulns=$(echo "$meas_json" | jq -r '.component.measures[]? | select(.metric=="vulnerabilities") | .value // "?"')
          hotspots=$(echo "$meas_json" | jq -r '.component.measures[]? | select(.metric=="security_hotspots") | .value // "?"')
          total_cov=$(echo "$meas_json" | jq -r '.component.measures[]? | select(.metric=="coverage") | .value // "?"')

          icon() { case "$1" in OK) echo "✅";; ERROR) echo "❌";; WARN) echo "⚠️";; *) echo "⚪";; esac; }

          {
            echo "qg_status=${qg_status}"
            echo "qg_icon=$(icon "$qg_status")"
            echo "new_cov=${new_cov}"
            echo "new_cov_icon=$(icon "$new_cov_status")"
            echo "new_dup=${new_dup}"
            echo "new_dup_icon=$(icon "$new_dup_status")"
            echo "new_viol=${new_viol}"
            echo "new_viol_icon=$(icon "$new_viol_status")"
            echo "bugs=${bugs}"
            echo "smells=${smells}"
            echo "vulns=${vulns}"
            echo "hotspots=${hotspots}"
            echo "total_cov=${total_cov}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse vitest coverage (from LCOV)
        id: cov
        continue-on-error: true
        run: |
          if [[ ! -f coverage/lcov.info ]]; then
            echo "has_lcov=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Somme LF (lines found) et LH (lines hit) du lcov pour calculer %
          lf=$(grep -c '^LF:' coverage/lcov.info || echo 0)
          total_lines=$(awk -F: '/^LF:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          hit_lines=$(awk -F: '/^LH:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          total_branches=$(awk -F: '/^BRF:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          hit_branches=$(awk -F: '/^BRH:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          if [[ "$total_lines" -gt 0 ]]; then
            line_pct=$(awk "BEGIN {printf \"%.1f\", ($hit_lines/$total_lines)*100}")
          else
            line_pct="?"
          fi
          if [[ "$total_branches" -gt 0 ]]; then
            branch_pct=$(awk "BEGIN {printf \"%.1f\", ($hit_branches/$total_branches)*100}")
          else
            branch_pct="?"
          fi
          {
            echo "has_lcov=true"
            echo "files=${lf}"
            echo "line_pct=${line_pct}"
            echo "branch_pct=${branch_pct}"
            echo "hit_lines=${hit_lines}"
            echo "total_lines=${total_lines}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute CI job icons
        id: jobs
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; cancelled) echo "🚫";; *) echo "⏳";; esac; }
          {
            echo "lint=$(icon '${{ needs.lint-types.result }}')"
            echo "tests=$(icon '${{ needs.unit-tests.result }}')"
            echo "build=$(icon '${{ needs.build.result }}')"
            echo "sonar=$(icon '${{ needs.sonarqube.result }}')"
            echo "lychee=$(icon '${{ needs.lychee.result }}')"
            echo "e2e=$(icon '${{ needs.e2e-smoke.result }}')"
            echo "lh=$(icon '${{ needs.lighthouse.result }}')"
          } >> "$GITHUB_OUTPUT"

      - name: Post/update metrics comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: pr-metrics
          message: |
            ## 📊 Métriques CI — PR ${{ github.event.pull_request.number }}

            ### ✨ Quality Gate SonarQube — ${{ steps.sonar.outputs.qg_icon }} `${{ steps.sonar.outputs.qg_status }}`

            | Métrique (new code) | Valeur | Seuil | Status |
            |---------------------|--------|-------|--------|
            | Couverture | `${{ steps.sonar.outputs.new_cov }}%` | ≥ 80% | ${{ steps.sonar.outputs.new_cov_icon }} |
            | Duplications | `${{ steps.sonar.outputs.new_dup }}%` | ≤ 3% | ${{ steps.sonar.outputs.new_dup_icon }} |
            | Violations | `${{ steps.sonar.outputs.new_viol }}` | 0 | ${{ steps.sonar.outputs.new_viol_icon }} |

            **Totaux projet** : 🐛 `${{ steps.sonar.outputs.bugs }}` bugs · 🧹 `${{ steps.sonar.outputs.smells }}` code smells · 🔒 `${{ steps.sonar.outputs.vulns }}` vulnérabilités · ⚠️ `${{ steps.sonar.outputs.hotspots }}` hotspots · 📏 couverture globale `${{ steps.sonar.outputs.total_cov }}%`

            ### 🧪 Couverture unitaire (LCOV)

            `${{ steps.cov.outputs.line_pct }}%` lignes (`${{ steps.cov.outputs.hit_lines }}`/`${{ steps.cov.outputs.total_lines }}`) · `${{ steps.cov.outputs.branch_pct }}%` branches · `${{ steps.cov.outputs.files }}` fichiers

            ### 🏁 Jobs CI

            | Job | Status |
            |-----|--------|
            | Lint & type-check | ${{ steps.jobs.outputs.lint }} |
            | Unit tests (80% gate) | ${{ steps.jobs.outputs.tests }} |
            | Build (SSG export) | ${{ steps.jobs.outputs.build }} |
            | SonarQube scan | ${{ steps.jobs.outputs.sonar }} |
            | Broken links (lychee) | ${{ steps.jobs.outputs.lychee }} |
            | E2E smoke (chromium) | ${{ steps.jobs.outputs.e2e }} |
            | Lighthouse CI | ${{ steps.jobs.outputs.lh }} |

            <sub>🔄 Commentaire mis à jour à chaque push. Dashboard SonarQube consultable en interne.</sub>

  deploy-preview:
    # Déploie la preview Vercel uniquement si TOUS les autres jobs ont réussi.
    # Ce job remplace le déploiement auto Vercel git-triggered, qui est désactivé
    # côté dashboard Vercel (Settings → Git → Ignored Build Step = `exit 0`).
    # Voir la PR d'introduction pour la checklist de configuration manuelle.
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - gitleaks
      - npm-audit
      - lint-types
      - unit-tests
      - build
      - validate-seo-files
      - lighthouse
      - lychee
      - e2e-smoke
      - sonarqube
    # Ne tourne pas sur les PR Dependabot (elles n'ont pas accès aux secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR (sticky)
        # Met à jour UN seul commentaire via `header:` — évite l'empilement à
        # chaque push. Action maintenue, 2M+ téléchargements, pas de dépendance
        # externe au runtime.
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: vercel-preview
          message: |
            :rocket: **Preview Vercel déployée** (après validation de la CI)

            ${{ steps.deploy.outputs.url }}

            _Mise à jour automatique à chaque push sur cette branche après que tous les checks passent._
