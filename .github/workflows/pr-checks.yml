name: PR Checks

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  # Variables Matomo inlinees au build par Next.js — valeurs factices en CI.
  # Les vraies valeurs sont injectees au build Docker (cf. cd.yml).
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: Dependency audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      # Pourquoi --audit-level=critical :
      # Site 100% SSG (output: 'export'). Les CVE HIGH sur next.js (DoS SSR,
      # Image Optimizer, rewrites, RSC deserialization) ne s'appliquent pas :
      # Next.js ne tourne qu'au build-time, pas au runtime (c'est Nginx qui sert).
      # Les MAJ majeures (next 14→16) sont pilotées par Dependabot.
      # On bloque donc seulement sur CRITICAL — à remonter à HIGH si le projet
      # bascule un jour en SSR/API routes.
      - name: npm audit (production deps only)
        run: npm audit --omit=dev --audit-level=critical

  lint-types:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Check hardcoded colors (RG-29)
        run: ./scripts/check-hardcoded-colors.sh

  unit-tests:
    name: Unit tests (coverage 80% gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # requis pour Sonar (history de blame)

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        # Le gate 80% est configure dans vitest.config.ts
        # (thresholds statements/branches/functions/lines = 80).
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 7

  build:
    name: Build (SSG export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-types]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: next-out
          path: out/
          retention-days: 3

  validate-seo-files:
    name: Validate SEO/IA files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Validate sitemap / robots / llms.txt
        run: node scripts/validate-static-output.ts

  lighthouse:
    name: Lighthouse CI (SEO / a11y / perf)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true

      - name: Extract Lighthouse scores
        if: always() && steps.lhci.outputs.manifest != ''
        env:
          # Passer le manifest via env évite les soucis de quoting lors de
          # l'interpolation YAML (le JSON peut contenir des single quotes).
          LHCI_MANIFEST: ${{ steps.lhci.outputs.manifest }}
        run: |
          # manifest = JSON array [{ url, isRepresentativeRun, summary: { performance, accessibility, best-practices, seo, pwa } }]
          # On ne prend que les runs représentatifs de chaque URL et on calcule
          # la moyenne par catégorie. Scores float [0..1] → entier 0..100.
          node -e '
            const manifest = JSON.parse(process.env.LHCI_MANIFEST);
            const repr = manifest.filter(r => r.isRepresentativeRun);
            if (repr.length === 0) { console.log("no representative runs"); process.exit(0); }
            const metrics = ["performance", "accessibility", "best-practices", "seo"];
            const avg = {};
            for (const m of metrics) {
              const scores = repr.map(r => r.summary?.[m] ?? 0).filter(Number.isFinite);
              avg[m] = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0) / scores.length * 100) : 0;
            }
            require("fs").writeFileSync("lh-scores.json", JSON.stringify({
              performance: avg.performance,
              accessibility: avg.accessibility,
              bestPractices: avg["best-practices"],
              seo: avg.seo,
              urls: repr.length,
            }));
            console.log(JSON.parse(require("fs").readFileSync("lh-scores.json","utf8")));
          '

      - name: Upload Lighthouse scores artifact
        if: always() && hashFiles('lh-scores.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-scores
          path: lh-scores.json
          retention-days: 7

  lychee:
    name: Broken links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Restore lychee cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Lychee link check
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --config .lychee.toml --cache --root-dir ${{ github.workspace }}/out './out/**/*.html'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract lychee stats
        if: always()
        run: |
          # Le rapport markdown est écrit par l'action dans lychee/out.md (param
          # INPUT_OUTPUT). On en extrait les trois compteurs de la table de
          # summary. Robuste au cas où le rapport n'existe pas (CI failed tôt).
          total=0; success=0; errors=0
          if [[ -f lychee/out.md ]]; then
            total=$(grep -oE 'Total[[:space:]]*\|[[:space:]]*[0-9]+' lychee/out.md | grep -oE '[0-9]+' | head -1 || echo 0)
            success=$(grep -oE 'Successful[[:space:]]*\|[[:space:]]*[0-9]+' lychee/out.md | grep -oE '[0-9]+' | head -1 || echo 0)
            errors=$(grep -oE 'Errors[[:space:]]*\|[[:space:]]*[0-9]+' lychee/out.md | grep -oE '[0-9]+' | head -1 || echo 0)
          fi
          cat > lychee-stats.json <<EOF
          { "total": ${total:-0}, "success": ${success:-0}, "errors": ${errors:-0} }
          EOF
          cat lychee-stats.json

      - name: Upload lychee stats artifact
        if: always() && hashFiles('lychee-stats.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-stats
          path: lychee-stats.json
          retention-days: 7

  e2e-smoke:
    name: E2E smoke (chromium)
    runs-on: ubuntu-latest
    # Container Playwright officiel : browsers + deps systeme deja dans l'image,
    # AUCUN `playwright install`. Sur les runners, `--with-deps` (apt/needrestart)
    # hangait indefiniment et consommait tout le timeout (diagnostic 2026-06-03).
    # MAINTENANCE : la version d'image DOIT matcher @playwright/test (package.json).
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 25
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Run Playwright smoke tests
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  e2e-visual:
    # RG-25 — Tests de regression visuelle Playwright. 10 routes x 2 themes
    # (light + dark) = 20 baselines committees dans e2e/visual.spec.ts-snapshots/.
    # Echec si diff > 0.1% (config maxDiffPixelRatio=0.001 dans
    # playwright.config.ts). En cas d'echec, le rapport HTML uploade contient
    # les diffs visuels (actual vs expected) pour debug.
    name: E2E visual regression
    runs-on: ubuntu-latest
    # Container Playwright officiel (meme rationale que e2e-smoke, 2026-06-03).
    # Les baselines visuelles DOIVENT etre generees dans ce meme container
    # (update-snapshots.yml utilise la meme image) pour eviter le bruit cross-env.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 25
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Run visual regression tests
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
        run: npx playwright test --project=visual

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-visual
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy-firebase-preview:
    # Canal de preview par PR (id auto = pr<numero>, expire 7j, commentaire
    # natif posté sur la PR par l'action elle-même). Skip sur les PRs de
    # forks : le secret FIREBASE_SERVICE_ACCOUNT_* n'est pas exposé aux
    # workflows `pull_request` déclenchés depuis un fork (même garde que
    # pr-metrics-comment plus bas).
    name: Deploy Firebase preview channel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Deploy Firebase preview channel
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLAUDE_CODEX_FR }}
          projectId: claude-codex-fr

  sonarqube:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-lcov
          path: coverage/

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  pr-metrics-comment:
    # Commentaire sticky unique qui consolide toutes les métriques d'analyse
    # (Sonar, Lighthouse, Lychee, tests, Firebase). Tourne avec if: always()
    # pour reporter l'état même si un job amont a failed. Skip les PRs
    # Dependabot (pas d'accès aux secrets Sonar). Le header: pr-metrics
    # garantit qu'un seul commentaire existe par PR, mis à jour à chaque push.
    name: PR metrics comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint-types
      - unit-tests
      - build
      - validate-seo-files
      - sonarqube
      - lychee
      - e2e-smoke
      - e2e-visual
      - lighthouse
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: coverage-lcov
          path: coverage/

      - name: Download Lighthouse scores artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: lighthouse-scores
          path: lh/

      - name: Download lychee stats artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: lychee-stats
          path: lychee/

      - name: Collect SonarQube metrics
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: the-claude-codex
        run: |
          set -euo pipefail
          # Authorization Basic via header (évite le rule gitleaks curl-auth-user
          # qui matche le pattern `-u user:` et ralerait sur un faux positif).
          auth="Authorization: Basic $(printf '%s:' "$SONAR_TOKEN" | base64 -w0)"

          qg_json=$(curl -sf -H "$auth" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}" \
            || echo '{}')
          qg_status=$(echo "$qg_json" | jq -r '.projectStatus.status // "UNKNOWN"')

          # Extrait les 3 conditions nouvelles du QG : coverage, duplications, violations.
          get_cond() {
            echo "$qg_json" | jq -r ".projectStatus.conditions[]? | select(.metricKey==\"$1\") | .$2 // \"?\""
          }
          new_cov=$(get_cond new_coverage actualValue)
          new_cov_status=$(get_cond new_coverage status)
          new_dup=$(get_cond new_duplicated_lines_density actualValue)
          new_dup_status=$(get_cond new_duplicated_lines_density status)
          new_viol=$(get_cond new_violations actualValue)
          new_viol_status=$(get_cond new_violations status)

          meas_json=$(curl -sf -H "$auth" \
            "${SONAR_HOST_URL}/api/measures/component?component=${SONAR_PROJECT_KEY}&metricKeys=bugs,code_smells,vulnerabilities,security_hotspots,coverage,cognitive_complexity" \
            || echo '{}')
          get_meas() {
            echo "$meas_json" | jq -r ".component.measures[]? | select(.metric==\"$1\") | .value // \"?\""
          }
          bugs=$(get_meas bugs)
          smells=$(get_meas code_smells)
          vulns=$(get_meas vulnerabilities)
          hotspots=$(get_meas security_hotspots)
          total_cov=$(get_meas coverage)
          cog=$(get_meas cognitive_complexity)

          qg_icon() { case "$1" in OK) echo "✅";; ERROR) echo "❌";; WARN) echo "⚠️";; *) echo "⚪";; esac; }

          {
            echo "qg_status=${qg_status}"
            echo "qg_icon=$(qg_icon "$qg_status")"
            echo "new_cov=${new_cov}"
            echo "new_cov_icon=$(qg_icon "$new_cov_status")"
            echo "new_dup=${new_dup}"
            echo "new_dup_icon=$(qg_icon "$new_dup_status")"
            echo "new_viol=${new_viol}"
            echo "new_viol_icon=$(qg_icon "$new_viol_status")"
            echo "bugs=${bugs}"
            echo "smells=${smells}"
            echo "vulns=${vulns}"
            echo "hotspots=${hotspots}"
            echo "total_cov=${total_cov}"
            echo "cog=${cog}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse LCOV (vitest coverage)
        id: cov
        continue-on-error: true
        run: |
          if [[ ! -f coverage/lcov.info ]]; then
            {
              echo "has_lcov=false"
              echo "line_pct=?"
              echo "branch_pct=?"
              echo "files=?"
              echo "hit_lines=?"
              echo "total_lines=?"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          lf=$(grep -c '^LF:' coverage/lcov.info || echo 0)
          total_lines=$(awk -F: '/^LF:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          hit_lines=$(awk -F: '/^LH:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          total_branches=$(awk -F: '/^BRF:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          hit_branches=$(awk -F: '/^BRH:/ {s+=$2} END {print s+0}' coverage/lcov.info)
          line_pct=$([[ "$total_lines" -gt 0 ]] && awk "BEGIN {printf \"%.1f\", ($hit_lines/$total_lines)*100}" || echo "?")
          branch_pct=$([[ "$total_branches" -gt 0 ]] && awk "BEGIN {printf \"%.1f\", ($hit_branches/$total_branches)*100}" || echo "?")
          {
            echo "has_lcov=true"
            echo "files=${lf}"
            echo "line_pct=${line_pct}"
            echo "branch_pct=${branch_pct}"
            echo "hit_lines=${hit_lines}"
            echo "total_lines=${total_lines}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse Lighthouse scores
        id: lh
        continue-on-error: true
        run: |
          if [[ ! -f lh/lh-scores.json ]]; then
            {
              echo "has_lh=false"
              echo "perf=?"; echo "perf_icon=⚪"
              echo "a11y=?"; echo "a11y_icon=⚪"
              echo "best=?"; echo "best_icon=⚪"
              echo "seo=?"; echo "seo_icon=⚪"
              echo "urls=0"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Icône selon barème Lighthouse : ≥ 90 vert, ≥ 50 orange, sinon rouge
          lh_icon() {
            local v="$1"
            if [[ "$v" -ge 90 ]]; then echo "🟢"
            elif [[ "$v" -ge 50 ]]; then echo "🟠"
            else echo "🔴"; fi
          }
          perf=$(jq -r '.performance' lh/lh-scores.json)
          a11y=$(jq -r '.accessibility' lh/lh-scores.json)
          best=$(jq -r '.bestPractices' lh/lh-scores.json)
          seo=$(jq -r '.seo' lh/lh-scores.json)
          urls=$(jq -r '.urls' lh/lh-scores.json)
          {
            echo "has_lh=true"
            echo "perf=${perf}"; echo "perf_icon=$(lh_icon "$perf")"
            echo "a11y=${a11y}"; echo "a11y_icon=$(lh_icon "$a11y")"
            echo "best=${best}"; echo "best_icon=$(lh_icon "$best")"
            echo "seo=${seo}"; echo "seo_icon=$(lh_icon "$seo")"
            echo "urls=${urls}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse lychee stats
        id: lychee
        continue-on-error: true
        run: |
          if [[ ! -f lychee/lychee-stats.json ]]; then
            {
              echo "has_lychee=false"
              echo "total=?"; echo "success=?"; echo "errors=?"; echo "errors_icon=⚪"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(jq -r '.total' lychee/lychee-stats.json)
          success=$(jq -r '.success' lychee/lychee-stats.json)
          errors=$(jq -r '.errors' lychee/lychee-stats.json)
          errors_icon=$([[ "$errors" -eq 0 ]] && echo "✅" || echo "❌")
          {
            echo "has_lychee=true"
            echo "total=${total}"
            echo "success=${success}"
            echo "errors=${errors}"
            echo "errors_icon=${errors_icon}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute CI job icons
        id: jobs
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; cancelled) echo "🚫";; *) echo "⏳";; esac; }
          {
            echo "lint=$(icon '${{ needs.lint-types.result }}')"
            echo "tests=$(icon '${{ needs.unit-tests.result }}')"
            echo "build=$(icon '${{ needs.build.result }}')"
            echo "seo=$(icon '${{ needs.validate-seo-files.result }}')"
            echo "sonar=$(icon '${{ needs.sonarqube.result }}')"
            echo "lychee=$(icon '${{ needs.lychee.result }}')"
            echo "e2e=$(icon '${{ needs.e2e-smoke.result }}')"
            echo "lhjob=$(icon '${{ needs.lighthouse.result }}')"
          } >> "$GITHUB_OUTPUT"

      - name: Post/update consolidated metrics comment
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-metrics
          message: |
            ## 📊 Métriques CI — PR #${{ github.event.pull_request.number }}

            🚀 **Preview Firebase Hosting** déployée automatiquement sur un canal dédié à cette PR. URL publiée par le commentaire natif de l'action `action-hosting-deploy` ci-dessus.

            ### ✨ Quality Gate SonarQube — ${{ steps.sonar.outputs.qg_icon }} `${{ steps.sonar.outputs.qg_status }}`

            | Métrique (new code) | Valeur | Seuil | Status |
            |---------------------|--------|-------|--------|
            | Couverture | `${{ steps.sonar.outputs.new_cov }}%` | ≥ 80% | ${{ steps.sonar.outputs.new_cov_icon }} |
            | Duplications | `${{ steps.sonar.outputs.new_dup }}%` | ≤ 3% | ${{ steps.sonar.outputs.new_dup_icon }} |
            | Violations | `${{ steps.sonar.outputs.new_viol }}` | 0 | ${{ steps.sonar.outputs.new_viol_icon }} |

            **Totaux projet** : 🐛 `${{ steps.sonar.outputs.bugs }}` bugs · 🧹 `${{ steps.sonar.outputs.smells }}` smells · 🔒 `${{ steps.sonar.outputs.vulns }}` vulns · ⚠️ `${{ steps.sonar.outputs.hotspots }}` hotspots · 📏 `${{ steps.sonar.outputs.total_cov }}%` coverage · 🧠 `${{ steps.sonar.outputs.cog }}` cognitive complexity

            ### 🚦 Lighthouse (moyenne sur ${{ steps.lh.outputs.urls }} URL)

            | Performance | Accessibilité | Bonnes pratiques | SEO |
            |:-----------:|:-------------:|:----------------:|:---:|
            | ${{ steps.lh.outputs.perf_icon }} `${{ steps.lh.outputs.perf }}` | ${{ steps.lh.outputs.a11y_icon }} `${{ steps.lh.outputs.a11y }}` | ${{ steps.lh.outputs.best_icon }} `${{ steps.lh.outputs.best }}` | ${{ steps.lh.outputs.seo_icon }} `${{ steps.lh.outputs.seo }}` |

            ### 🔗 Liens cassés (lychee)

            ${{ steps.lychee.outputs.errors_icon }} `${{ steps.lychee.outputs.errors }}` erreurs sur `${{ steps.lychee.outputs.total }}` liens vérifiés (`${{ steps.lychee.outputs.success }}` OK)

            ### 🧪 Couverture unitaire (LCOV)

            `${{ steps.cov.outputs.line_pct }}%` lignes (`${{ steps.cov.outputs.hit_lines }}`/`${{ steps.cov.outputs.total_lines }}`) · `${{ steps.cov.outputs.branch_pct }}%` branches · `${{ steps.cov.outputs.files }}` fichiers

            ### 🏁 Jobs CI

            | Lint | Tests | Build | SEO/IA | Sonar | Lychee | E2E | Lighthouse |
            |:----:|:-----:|:-----:|:------:|:-----:|:------:|:---:|:----------:|
            | ${{ steps.jobs.outputs.lint }} | ${{ steps.jobs.outputs.tests }} | ${{ steps.jobs.outputs.build }} | ${{ steps.jobs.outputs.seo }} | ${{ steps.jobs.outputs.sonar }} | ${{ steps.jobs.outputs.lychee }} | ${{ steps.jobs.outputs.e2e }} | ${{ steps.jobs.outputs.lhjob }} |

            <sub>🔄 Commentaire mis à jour à chaque push. Toutes les métriques sont agrégées automatiquement depuis les jobs CI.</sub>
