name: Weekly article stats

on:
  schedule:
    # Lundi 08:00 UTC, conforme spec CTN-7
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-article-stats
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh article-stats.json + draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout claude-codex
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh stats
        env:
          MATOMO_API_URL: ${{ vars.MATOMO_BASE_URL || 'https://matomo.tellebma.fr' }}
          MATOMO_AUTH_TOKEN: ${{ secrets.MATOMO_TOKEN_AUTH }}
          MATOMO_SITE_ID: ${{ secrets.MATOMO_SITE_ID }}
        run: npm run refresh:article-stats

      - name: Detect changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain src/data/article-stats.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR body
        if: steps.diff.outputs.changed == 'true'
        run: |
          npx tsx scripts/build-stats-pr-body.ts \
            src/data/article-stats.json \
            "${RUNNER_TEMP}/article-stats-pr-body.md"

      - name: Commit + push + open draft PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/weekly-article-stats-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/article-stats.json
          git commit -m "chore(stats): refresh article-stats.json"
          git push origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore(stats): weekly article stats refresh" \
            --body-file "${RUNNER_TEMP}/article-stats-pr-body.md" \
            --label chore --label stats \
            --draft

      - name: Report no-op
        if: steps.diff.outputs.changed == 'false'
        run: echo "No diff in src/data/article-stats.json — skipping PR creation."
