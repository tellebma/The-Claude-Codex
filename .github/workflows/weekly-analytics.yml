name: Weekly analytics

on:
  schedule:
    # Lundi 06:00 UTC = 07:00/08:00 Paris (ete/hiver)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      period_days:
        description: "Nombre de jours a analyser (default 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-analytics
  cancel-in-progress: false

jobs:
  analyze:
    name: Fetch GSC + Matomo, detect alerts, open PR, notify Discord
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GSC_SITE_URL: ${{ vars.GSC_SITE_URL || 'sc-domain:claude-codex.fr' }}
      GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
      MATOMO_BASE_URL: ${{ vars.MATOMO_BASE_URL || 'https://matomo.tellebma.fr' }}
      MATOMO_SITE_ID: ${{ secrets.MATOMO_SITE_ID }}
      MATOMO_TOKEN_AUTH: ${{ secrets.MATOMO_TOKEN_AUTH }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      ANALYTICS_PERIOD_DAYS: ${{ github.event.inputs.period_days || '7' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run analytics pipeline
        id: run
        run: |
          node scripts/analytics/run.ts
          END_DATE=$(ls -1 docs/analytics | sort | tail -n1)
          echo "end_date=${END_DATE}" >> "$GITHUB_OUTPUT"
          echo "branch=auto/analytics-${END_DATE}" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-${{ steps.run.outputs.end_date }}
          path: docs/analytics/${{ steps.run.outputs.end_date }}/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and push report
        id: commit
        run: |
          if [ -z "$(git status --porcelain docs/analytics)" ]; then
            echo "Pas de changement a committer"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.run.outputs.branch }}"
          git checkout -B "$BRANCH"
          git add docs/analytics
          git commit -m "chore(analytics): report ${{ steps.run.outputs.end_date }}"
          git push -f -u origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.run.outputs.branch }}"
          END_DATE="${{ steps.run.outputs.end_date }}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q ".[0].number" || true)
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "chore(analytics): rapport hebdo ${END_DATE}" \
              --body "Rapport analytics genere automatiquement. Voir \`docs/analytics/${END_DATE}/REPORT.md\`."
          else
            gh pr comment "$EXISTING" --body "Report mis a jour : docs/analytics/${END_DATE}/REPORT.md"
          fi
