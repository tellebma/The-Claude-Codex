services:
  web:
    image: tellebma/the-claude-codex:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-codex
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
