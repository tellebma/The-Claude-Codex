# Shared security headers — included in every location block
# that uses add_header (nginx inheritance gotcha: add_header in a
# child block replaces ALL parent add_header directives).

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# CSP: Matomo origin is injected via envsubst at deploy time if analytics
# are enabled. Without it, the policy still works (self-only for analytics).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://matomo.tellebma.fr; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.youtube.com https://matomo.tellebma.fr; frame-src https://www.youtube-nocookie.com; connect-src 'self' https://matomo.tellebma.fr;" always;
add_header Strict-Transport-Security $hsts_value always;
