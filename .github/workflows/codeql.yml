name: CodeQL

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  schedule:
    # Scan hebdo le lundi matin — attrape les CVE découvertes entre deux PR.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # Le nom du job devient le nom du check publie par GitHub Actions.
    # La ruleset develop attend un check "CodeQL" venant d'Actions
    # (integration_id 15368), donc on aligne ici.
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:javascript-typescript"
