worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1m;

    # Gzip compression — optimized settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/xhtml+xml
        application/wasm
        image/svg+xml
        font/woff2;

    # Pre-compressed file serving (Brotli/gzip pre-compressed assets)
    gzip_static on;

    # HSTS — map at http block level to avoid sending an empty header on HTTP.
    # When $https is "on" (HTTPS connection), the full HSTS value is used.
    # When $https is empty (plain HTTP), the variable resolves to "" and
    # add_header is skipped because nginx does not emit headers with empty values
    # when the value is a variable (as opposed to the set+if approach which
    # always emits the header, even with an empty value).
    map $https $hsts_value {
        "on"    "max-age=63072000; includeSubDomains; preload";
        default "";
    }

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # X-XSS-Protection removed — deprecated header, modern browsers ignore it
        # and it can introduce XSS vulnerabilities in older browsers.
        # CSP provides proper XSS protection instead.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.youtube.com; frame-src https://www.youtube-nocookie.com; connect-src 'self';" always;

        # HSTS — only sent on HTTPS connections (mapped above).
        # nginx skips add_header directives whose value is an empty string.
        add_header Strict-Transport-Security $hsts_value always;

        # Hide server version
        server_tokens off;

        # Static file caching — long cache with immutable for hashed assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|br|gz)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML files — no cache for fresh deploys
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # SPA routing — serve index.html for all routes
        location / {
            try_files $uri $uri/index.html $uri.html /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
