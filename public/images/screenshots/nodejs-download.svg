<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none">
  <!-- Browser window background -->
  <rect width="480" height="280" rx="10" fill="#f8fafc"/>
  <!-- Browser chrome -->
  <rect width="480" height="44" rx="10" fill="#e2e8f0"/>
  <rect y="34" width="480" height="10" fill="#e2e8f0"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="22" r="6" fill="#ef4444"/>
  <circle cx="36" cy="22" r="6" fill="#eab308"/>
  <circle cx="54" cy="22" r="6" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="80" y="12" width="280" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="96" y="18" width="120" height="8" rx="3" fill="#64748b"/>
  <!-- Page content area -->
  <!-- Node.js logo area -->
  <rect x="40" y="70" width="60" height="60" rx="8" fill="#026e00"/>
  <text x="70" y="107" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">N</text>
  <!-- Title -->
  <rect x="120" y="76" width="160" height="16" rx="4" fill="#1e293b"/>
  <rect x="120" y="100" width="120" height="12" rx="4" fill="#64748b"/>
  <!-- Download buttons -->
  <rect x="40" y="150" width="180" height="48" rx="8" fill="#026e00"/>
  <rect x="56" y="162" width="148" height="12" rx="3" fill="#4ade80"/>
  <rect x="56" y="178" width="100" height="8" rx="3" fill="#86efac"/>
  <rect x="240" y="150" width="180" height="48" rx="8" fill="#0369a1"/>
  <rect x="256" y="162" width="148" height="12" rx="3" fill="#7dd3fc"/>
  <rect x="256" y="178" width="100" height="8" rx="3" fill="#bae6fd"/>
  <!-- LTS badge -->
  <rect x="40" y="206" width="60" height="20" rx="4" fill="#16a34a"/>
  <rect x="48" y="212" width="44" height="8" rx="2" fill="#bbf7d0"/>
  <!-- Current badge -->
  <rect x="240" y="206" width="70" height="20" rx="4" fill="#0369a1"/>
  <rect x="248" y="212" width="54" height="8" rx="2" fill="#bae6fd"/>
  <!-- Version text placeholder -->
  <rect x="40" y="234" width="90" height="8" rx="2" fill="#94a3b8"/>
  <rect x="240" y="234" width="90" height="8" rx="2" fill="#94a3b8"/>
</svg>
