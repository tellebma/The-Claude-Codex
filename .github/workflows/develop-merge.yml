name: Develop Merge

on:
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: develop-merge-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  build:
    name: Build (SSG export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: next-out
          path: out/
          retention-days: 7

  e2e-full:
    name: E2E full (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    # Container Playwright officiel : browsers + deps systeme deja dans l'image,
    # AUCUN `playwright install`. Sur les runners, `--with-deps` (apt/needrestart)
    # pendait indefiniment et consommait tout le timeout (diagnostic 2026-06-03,
    # meme cause que e2e-smoke/e2e-visual dans pr-checks.yml, corrigee ici aussi).
    # MAINTENANCE : la version d'image DOIT matcher @playwright/test (package.json).
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 25
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-out
          path: out/

      - name: Run Playwright (sharded)
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
          PLAYWRIGHT_ALL_BROWSERS: "1"
          # Firefox refuse de se lancer si le dossier $HOME n'appartient pas a
          # l'utilisateur courant. Dans le container Playwright officiel sur
          # GitHub Actions, HOME=/github/home n'appartient pas a l'utilisateur
          # qui execute le process. Workaround officiel Playwright : forcer
          # HOME=/root (utilisateur root du container).
          HOME: /root
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7
          if-no-files-found: ignore

  e2e-report:
    name: E2E merged report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [e2e-full]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14

  notify-vercel:
    # Notifie Vercel du statut de la CI pour son feature "Connect GitHub Actions"
    # (Settings → Git → Connected GitHub Actions). Vercel attend ce check avant
    # de promouvoir le deploy de l'environnement "dev" (branche develop).
    # `if: always()` fait tourner le job quel que soit le résultat des `needs:`,
    # le step suivant fail si un job needs est KO → l'action vercel (post:)
    # envoie alors un status "failure" à Vercel, qui abandonne le deploy.
    name: Notify Vercel (CI gate)
    runs-on: ubuntu-latest
    needs: [build, e2e-full, docker-verify]
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Notify Vercel (register check)
        uses: vercel/repository-dispatch/actions/status@30f760c6640485cd92f8c785ef361382555fb712 # v1
        with:
          name: 'Vercel - the-claude-codex: ci'
      - name: Reflect CI result
        run: |
          b="${{ needs.build.result }}"
          e="${{ needs.e2e-full.result }}"
          d="${{ needs.docker-verify.result }}"
          echo "build=$b e2e-full=$e docker-verify=$d"
          if [ "$b" != "success" ] || [ "$e" != "success" ] || [ "$d" != "success" ]; then
            exit 1
          fi

  docker-verify:
    name: Docker build & Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: claude-codex:develop-verify

      - name: Verify image starts
        run: |
          docker run --rm -d --name develop-verify -p 9090:8080 claude-codex:develop-verify
          sleep 3
          curl -sf http://localhost:9090/fr/ | grep -q "Claude" && echo "FR page: OK"
          curl -sf http://localhost:9090/en/ | grep -q "Master" && echo "EN page: OK"
          docker stop develop-verify

      - name: Trivy — scan de l'image Docker
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: claude-codex:develop-verify
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
