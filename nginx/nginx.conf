worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1m;

    # Gzip compression — optimized settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/xhtml+xml
        application/wasm
        image/svg+xml
        font/woff2;

    # Pre-compressed file serving (Brotli/gzip pre-compressed assets)
    gzip_static on;

    # HSTS — map at http block level to avoid sending an empty header on HTTP.
    # When $https is "on" (HTTPS connection), the full HSTS value is used.
    # When $https is empty (plain HTTP), the variable resolves to "" and
    # add_header is skipped because nginx does not emit headers with empty values
    # when the value is a variable (as opposed to the set+if approach which
    # always emits the header, even with an empty value).
    map $https $hsts_value {
        "on"    "max-age=63072000; includeSubDomains; preload";
        default "";
    }

    # Real IP — trust NPM reverse proxy headers
    # Covers Docker bridge networks and local LAN
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.1.0/24;
    real_ip_header X-Real-IP;
    real_ip_recursive on;

    # Rate limiting — 10 req/s per IP with burst tolerance
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (server level — inherited by location blocks
        # that do NOT use add_header themselves)
        include /etc/nginx/security-headers.conf;

        # Hide server version
        server_tokens off;

        # Rate limiting applied globally (burst=20 allows short spikes)
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        # Static file caching — long cache with immutable for hashed assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|br|gz)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            access_log off;
        }

        # HTML files — no cache for fresh deploys
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            include /etc/nginx/security-headers.conf;
        }

        # Silence Next.js RSC prefetch requests that generate 404 errors.
        # Static export doesn't produce .txt RSC payloads, so prefetch
        # hits return 204 (no content) to avoid polluting the console.
        # Non-RSC .txt requests still get a 404.
        location ~* \.txt$ {
            if ($arg__rsc) {
                return 204;
            }
            return 404;
        }

        # i18n: redirect root to default locale
        location = / {
            return 301 /fr/;
        }

        # i18n: redirect old URLs without locale prefix to /fr/ equivalent
        # Match paths that don't start with /fr/ or /en/ and are not static files
        location ~ ^/(?!fr/|en/|_next/|health|icon|apple-touch|robots|sitemap)(.+)$ {
            return 301 /fr/$1;
        }

        # SPA routing — serve index.html for locale-prefixed routes
        location / {
            try_files $uri $uri/index.html $uri.html /fr/index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
