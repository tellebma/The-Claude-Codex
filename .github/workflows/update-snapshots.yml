name: Update Playwright visual snapshots

# Regénère les baselines visual regression (e2e/visual.spec.ts-snapshots/)
# sur ubuntu-latest = même OS que e2e-visual du PR Checks, pour éviter le
# bruit OS-cross (WSL2/macOS) qui ferait fail la CI après update local.
#
# Trigger manuel via "Actions > Update Playwright visual snapshots > Run workflow",
# avec le numéro de la PR à mettre à jour. Le workflow :
#   1. Checkout la branche de la PR
#   2. Build le site (Next.js SSG export)
#   3. Run Playwright avec --update-snapshots sur le project visual
#   4. Commit les snapshots modifiés sur la branche PR
#   5. Push (push direct, pas via PR — c'est la PR existante qu'on met à jour)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number whose branch needs snapshot refresh"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  update-visual-snapshots:
    name: Regenerate visual snapshots
    runs-on: ubuntu-latest
    # Container Playwright officiel = MEME image que e2e-visual de pr-checks.yml
    # (browsers preinstalls, pas de `playwright install` qui hangait sur apt).
    # Les baselines generees ici sont donc comparables en CI sans bruit cross-env.
    # MAINTENANCE : version d'image a aligner sur @playwright/test (package.json).
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 25
    steps:
      - name: Resolve PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # curl + node au lieu du CLI `gh` : absent de l'image container Playwright
        # (gh n'est preinstalle que sur les runners hosted).
        run: |
          pr_number="${{ github.event.inputs.pr_number }}"
          pr_json=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${pr_number}")
          head_ref=$(printf '%s' "$pr_json" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).head.ref))")
          head_sha=$(printf '%s' "$pr_json" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).head.sha))")
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$pr_number → branch $head_ref @ $head_sha"

      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (SSG export)
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
          NEXT_PUBLIC_MATOMO_SITE_ID: 1
        run: npm run build

      - name: Update visual snapshots
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
        run: npx playwright test --project=visual --update-snapshots

      - name: Configure git
        run: |
          # En container, le workspace monte appartient a un autre uid : sans
          # safe.directory, git refuse d'operer ("detected dubious ownership").
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push snapshots
        run: |
          # `git add` AVANT le check : `git diff --quiet` ignore les fichiers
          # non suivis, donc les baselines de NOUVELLES routes n'etaient jamais
          # committees (seules les modifications de baselines existantes l'etaient).
          git add e2e/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to commit."
            exit 0
          fi
          git commit -m "test(visual): regenerate snapshots via update-snapshots workflow (PR #${{ github.event.inputs.pr_number }})"
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-update-snapshots
          path: |
            playwright-report/
            test-results/
          retention-days: 7
