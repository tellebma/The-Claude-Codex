sonar.projectKey=the-claude-codex
sonar.projectName=The Claude Codex
sonar.projectVersion=1.2.0

# Sources
sonar.sources=src
sonar.tests=__tests__,e2e

# Exclusions : artefacts de build, dépendances, assets, scripts internes,
# docs et fichiers Claude — tout ce qui n'est pas du code source maintenu.
# Les composants React Three Fiber sont exclus car Sonar ne connaît pas les
# JSX intrinsics de R3F (rotation, position, args, toneMapped, etc.) et
# génère 20+ faux positifs S6747 "Unknown property".
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/coverage/**,**/*.d.ts,**/public/**,**/docs/**,**/.claude/**,**/scripts/**,src/components/ui/InteractiveRobot.tsx,src/components/ui/InteractiveRobotScene.tsx
sonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx,e2e/**/*.spec.ts

# Langue / encoding
sonar.sourceEncoding=UTF-8

# Coverage (LCOV généré par vitest — cf. README pour ajouter le reporter lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclure du code coverage ce qui n'a pas de logique :
# - layouts / pages App Router (Next.js génère ces fichiers, leur logique testable
#   est dans les composants qu'ils rendent, eux déjà couverts)
# - not-found / globals.css (pas de logique métier)
# - config i18n (next-intl : fichiers de configuration, pas de logique testable)
# - composants 3D React Three Fiber : nécessitent WebGL, pas exécutables
#   en jsdom. Le rendu visuel est validé via E2E/Playwright.
sonar.coverage.exclusions=src/app/**/layout.tsx,src/app/**/page.tsx,src/app/**/not-found.tsx,src/app/globals.css,src/**/*.d.ts,__tests__/**,e2e/**,src/i18n/config.ts,src/i18n/navigation.ts,src/i18n/routing.ts,src/i18n/request.ts,src/components/ui/InteractiveRobot.tsx,src/components/ui/InteractiveRobotScene.tsx

# Exclusions de duplication (CPD)
# US-09 — Les duplications réelles du projet viennent de fichiers dupliqués
# PAR DESIGN (bilingue, miroirs, tables de données) et non de code à factoriser.
#
# Catégorie 1 : fichiers data bilingues (miroirs FR/EN par construction)
#   - content/fr/** et content/en/** : MDX bilingue (même structure)
#   - messages/** : traductions UI next-intl
#   - src/data/search-index-fr.ts / search-index-en.ts : index SEO miroir
#   - src/data/site-pages.ts : entrées FR/EN dupliquées pour le sitemap i18n
#   - src/data/glossary.ts : les définitions FR sont suivies de leurs analogies
#     bilingues, causant des blocs de forme identique par couple de termes
#
# Catégorie 2 : tables de données et presets (forme répétée, pas de logique)
#   - src/lib/configurator/presets.ts : 10 presets avec la même shape
#     (profile + stacks + subscription + features), factoriser = over-engineering
#
# Catégorie 3 : pages section overview RSC (i18n par page)
#   - src/app/[locale]/*/page.tsx : chaque page section porte une structure
#     identique avec deux blocs de traductions inline (fr/en). C'est le pattern
#     recommandé par next-intl v4 pour les pages RSC avec generateMetadata.
#     Factoriser introduirait de la complexité sans bénéfice maintenabilité.
#
# Le code source TypeScript maintenu (composants, hooks, lib utilitaires)
# reste inclus dans le calcul : les vraies duplications de logique y sont
# détectées.
sonar.cpd.exclusions=content/fr/**,content/en/**,messages/**,src/data/search-index-fr.ts,src/data/search-index-en.ts,src/data/site-pages.ts,src/data/glossary.ts,src/lib/configurator/presets.ts,src/app/[locale]/*/page.tsx

# Exceptions ciblées (issue-level) sur des patterns intentionnels.
#
# S6819 — ARIA role over native element
#   1. SearchDialog / Screenshot : <div role="dialog" aria-modal="true">
#      Le natif <dialog> gère showModal/close, focus trap et Escape de
#      manière incompatible avec notre logique custom (iOS keyboard hack,
#      tab-focus trap avec prime-input off-screen, gestion de l'inert sur
#      #main-content). Migrer casserait le fix iOS Safari 17+ keyboard raise.
#   2. SearchDialog <div role="listbox"> + <div role="option">
#      Pattern WAI-ARIA combobox canonique (https://www.w3.org/WAI/ARIA/apg/
#      patterns/combobox/). <select>/<datalist> ne supportent pas le
#      rendering custom (icônes, descriptions, sections).
#
# S6845 — tabIndex on non-interactive element
#   MermaidDiagram <section tabIndex=0> : pattern a11y légitime pour une
#   zone de contenu scrollable au clavier (diagrammes qui débordent
#   horizontalement sur mobile). <section> est sémantique, tabIndex la
#   rend focusable — c'est exactement l'intention.
#
# S1874 — Deprecated API (document.execCommand)
#   CodeBlock + zip.ts : fallback de copie quand navigator.clipboard n'est
#   pas disponible (http://, iframe sandbox). Il n'y a PAS d'alternative
#   moderne équivalente pour ces contextes. L'API est dépréciée mais reste
#   implémentée dans tous les navigateurs actuels.
sonar.issue.ignore.multicriteria=ariaDialog,ariaListbox,mermaidTabindex,execCommandZip,execCommandCodeBlock
sonar.issue.ignore.multicriteria.ariaDialog.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.ariaDialog.resourceKey=src/components/ui/SearchDialog.tsx
sonar.issue.ignore.multicriteria.ariaListbox.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.ariaListbox.resourceKey=src/components/ui/Screenshot.tsx
sonar.issue.ignore.multicriteria.mermaidTabindex.ruleKey=typescript:S6845
sonar.issue.ignore.multicriteria.mermaidTabindex.resourceKey=src/components/ui/MermaidDiagram.tsx
sonar.issue.ignore.multicriteria.execCommandZip.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.execCommandZip.resourceKey=src/lib/configurator/zip.ts
sonar.issue.ignore.multicriteria.execCommandCodeBlock.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.execCommandCodeBlock.resourceKey=src/components/ui/CodeBlock.tsx

