name: PR Checks

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  # Variables Matomo inlinees au build par Next.js — valeurs factices en CI.
  # Les vraies valeurs sont injectees au build Docker (cf. cd.yml).
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: Dependency audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      # Pourquoi --audit-level=critical :
      # Site 100% SSG (output: 'export'). Les CVE HIGH sur next.js (DoS SSR,
      # Image Optimizer, rewrites, RSC deserialization) ne s'appliquent pas :
      # Next.js ne tourne qu'au build-time, pas au runtime (c'est Nginx qui sert).
      # Les MAJ majeures (next 14→16) sont pilotées par Dependabot.
      # On bloque donc seulement sur CRITICAL — à remonter à HIGH si le projet
      # bascule un jour en SSR/API routes.
      - name: npm audit (production deps only)
        run: npm audit --omit=dev --audit-level=critical

  lint-types:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

  unit-tests:
    name: Unit tests (coverage 80% gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # requis pour Sonar (history de blame)

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        # Le gate 80% est configure dans vitest.config.ts
        # (thresholds statements/branches/functions/lines = 80).
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 7

  build:
    name: Build (SSG export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-types]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: next-out
          path: out/
          retention-days: 3

  validate-seo-files:
    name: Validate SEO/IA files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Validate sitemap / robots / llms.txt
        run: node scripts/validate-static-output.ts

  lighthouse:
    name: Lighthouse CI (SEO / a11y / perf)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Run Lighthouse CI
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true

  lychee:
    name: Broken links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Restore lychee cache
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Lychee link check
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --cache --base ./out './out/**/*.html'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  e2e-smoke:
    name: E2E smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Run Playwright smoke tests
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  sonarqube:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-lcov
          path: coverage/

      - name: SonarQube scan
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy-preview:
    # Déploie la preview Vercel uniquement si TOUS les autres jobs ont réussi.
    # Ce job remplace le déploiement auto Vercel git-triggered, qui est désactivé
    # côté dashboard Vercel (Settings → Git → Ignored Build Step = `exit 0`).
    # Voir la PR d'introduction pour la checklist de configuration manuelle.
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - gitleaks
      - npm-audit
      - lint-types
      - unit-tests
      - build
      - validate-seo-files
      - lighthouse
      - lychee
      - e2e-smoke
      - sonarqube
    # Ne tourne pas sur les PR Dependabot (elles n'ont pas accès aux secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR (sticky)
        # Met à jour UN seul commentaire via `header:` — évite l'empilement à
        # chaque push. Action maintenue, 2M+ téléchargements, pas de dépendance
        # externe au runtime.
        # TODO: SHA-pin via Dependabot (github-actions group) après 1er run.
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            :rocket: **Preview Vercel déployée** (après validation de la CI)

            ${{ steps.deploy.outputs.url }}

            _Mise à jour automatique à chaque push sur cette branche après que tous les checks passent._
