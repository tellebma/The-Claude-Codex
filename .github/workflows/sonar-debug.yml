name: Sonar debug (temporaire)

# Workflow JETABLE — liste les issues SonarQube d'une PR pour diagnostiquer
# une condition new_violations du quality gate. A SUPPRIMER apres usage.

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number"
        required: true
        type: string

permissions:
  contents: read

jobs:
  sonar-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: List PR issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: the-claude-codex
          PR: ${{ github.event.inputs.pr }}
        run: |
          set -euo pipefail
          auth="Authorization: Basic $(printf '%s:' "$SONAR_TOKEN" | base64 -w0)"

          echo "===== QUALITY GATE (PR #$PR) ====="
          curl -sf -H "$auth" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}&pullRequest=${PR}" \
            | jq '.projectStatus.conditions'

          echo "===== ISSUES (PR #$PR) ====="
          curl -sf -H "$auth" \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&pullRequest=${PR}&resolved=false&ps=100" \
            | jq '.issues[] | {rule, severity, type, component, line, message, status}'

          echo "===== HOTSPOTS (PR #$PR) ====="
          curl -sf -H "$auth" \
            "${SONAR_HOST_URL}/api/hotspots/search?projectKey=${SONAR_PROJECT_KEY}&pullRequest=${PR}&ps=100" \
            | jq '.hotspots[] | {ruleKey, component, line, message, vulnerabilityProbability, status}'
