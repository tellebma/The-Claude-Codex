name: CD — Build & Push Docker

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  verify:
    name: Lint, type-check, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

  notify-vercel:
    # Notifie Vercel du statut de la CI pour son feature "Connect GitHub Actions"
    # (Settings → Git → Connected GitHub Actions). Vercel attend ce check avant
    # de promouvoir le deploy Production (branche main, claude-codex.fr).
    # `if: always()` fait tourner le job quel que soit le résultat de `verify`,
    # le step suivant fail si verify est KO → l'action vercel (post:) envoie
    # alors un status "failure" à Vercel, qui abandonne le deploy.
    name: Notify Vercel (CI gate)
    runs-on: ubuntu-latest
    needs: [verify]
    if: always()
    steps:
      - name: Notify Vercel (register check)
        uses: vercel/repository-dispatch/actions/status@30f760c6640485cd92f8c785ef361382555fb712 # v1
        with:
          name: 'Vercel - the-claude-codex: ci'
      - name: Reflect CI result
        run: |
          v="${{ needs.verify.result }}"
          echo "verify=$v"
          if [ "$v" != "success" ]; then
            exit 1
          fi

  docker:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: tellebma/how_to_use_claude
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build Docker image (scan first, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: tellebma/how_to_use_claude:pre-push-scan

      - name: Trivy — scan avant push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: tellebma/how_to_use_claude:pre-push-scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library

      - name: Build and push (reuses cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
