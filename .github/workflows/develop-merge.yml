name: Develop Merge

on:
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: develop-merge-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  build:
    name: Build (SSG export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: next-out
          path: out/
          retention-days: 7

  e2e-full:
    name: E2E full (${{ matrix.browser }} shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-out
          path: out/

      - name: Run Playwright (sharded)
        env:
          CI: "true"
          PLAYWRIGHT_USE_STATIC: "1"
          PLAYWRIGHT_ALL_BROWSERS: "1"
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7
          if-no-files-found: ignore

  e2e-report:
    name: E2E merged report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [e2e-full]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14

  notify-vercel:
    # Notifie Vercel du statut de la CI pour son feature "Connect GitHub Actions"
    # (Settings → Git → Connected GitHub Actions). Vercel attend ce check avant
    # de promouvoir le deploy de l'environnement "dev" (branche develop).
    # `if: always()` fait tourner le job quel que soit le résultat des `needs:`,
    # le step suivant fail si un job needs est KO → l'action vercel (post:)
    # envoie alors un status "failure" à Vercel, qui abandonne le deploy.
    name: Notify Vercel (CI gate)
    runs-on: ubuntu-latest
    needs: [build, e2e-full, docker-verify]
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Notify Vercel (register check)
        uses: vercel/repository-dispatch/actions/status@30f760c6640485cd92f8c785ef361382555fb712 # v1
        with:
          name: 'Vercel - the-claude-codex: ci'
      - name: Reflect CI result
        run: |
          b="${{ needs.build.result }}"
          e="${{ needs.e2e-full.result }}"
          d="${{ needs.docker-verify.result }}"
          echo "build=$b e2e-full=$e docker-verify=$d"
          if [ "$b" != "success" ] || [ "$e" != "success" ] || [ "$d" != "success" ]; then
            exit 1
          fi

  docker-verify:
    name: Docker build & Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: claude-codex:develop-verify

      - name: Verify image starts
        run: |
          docker run --rm -d --name develop-verify -p 9090:8080 claude-codex:develop-verify
          sleep 3
          curl -sf http://localhost:9090/fr/ | grep -q "Claude" && echo "FR page: OK"
          curl -sf http://localhost:9090/en/ | grep -q "Master" && echo "EN page: OK"
          docker stop develop-verify

      - name: Trivy — scan de l'image Docker
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: claude-codex:develop-verify
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
