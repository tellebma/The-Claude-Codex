name: CD — Build & Push Docker

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
  NEXT_PUBLIC_MATOMO_SITE_ID: "1"

jobs:
  verify:
    name: Lint, type-check, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

  deploy-firebase:
    # Déploie sur le canal "live" de Firebase Hosting (claude-codex.fr en prod).
    # Build dédié avec les VRAIES valeurs Matomo — ne pas réutiliser l'artifact
    # du job `verify` ci-dessus, qui build avec des placeholders CI
    # (matomo.example.com) uniquement pour valider que `next build` passe.
    # URL analytics.tellebma.fr (pas matomo.tellebma.fr) : cf. #301, le mot
    # "matomo" dans le nom de domaine est lui-même bloqué par les listes de
    # filtres anti-pub (EasyPrivacy/uBlock), indépendamment du chemin.
    name: Deploy to Firebase Hosting (live)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]
    env:
      NEXT_PUBLIC_MATOMO_URL: https://analytics.tellebma.fr
      NEXT_PUBLIC_MATOMO_SITE_ID: "3"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (real Matomo config)
        run: npm run build

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLAUDE_CODEX_FR }}
          projectId: claude-codex-fr
          channelId: live

  docker:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: tellebma/how_to_use_claude
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build Docker image (scan first, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: tellebma/how_to_use_claude:pre-push-scan

      - name: Trivy — scan avant push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: tellebma/how_to_use_claude:pre-push-scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library

      - name: Build and push (reuses cache)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
