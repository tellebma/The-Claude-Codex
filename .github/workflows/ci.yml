name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Annule les runs precedents d'une meme ref (PR ou branche) quand un nouveau commit arrive
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Variables d'env publiques Matomo inlinees au build par Next.js (NEXT_PUBLIC_*)
    # Valeurs factices pour la CI — les vraies valeurs sont injectees au build Docker (cf. cd.yml + Dockerfile).
    # Rien de secret ici : ces variables atterrissent dans le bundle JS final.
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_MATOMO_URL: https://matomo.example.com
      NEXT_PUBLIC_MATOMO_SITE_ID: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build (Next.js SSG export)
        run: npm run build

      - name: Verify i18n output
        run: |
          test -f out/fr/index.html && echo "FR landing: OK" || exit 1
          test -f out/en/index.html && echo "EN landing: OK" || exit 1

  docker-build:
    name: Docker build (verify)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: claude-codex:ci-test

      - name: Verify image starts
        run: |
          docker run --rm -d --name ci-test -p 9090:8080 claude-codex:ci-test
          sleep 3
          curl -sf http://localhost:9090/fr/ | grep -q "Claude" && echo "FR page: OK"
          curl -sf http://localhost:9090/en/ | grep -q "Master" && echo "EN page: OK"
          docker stop ci-test
